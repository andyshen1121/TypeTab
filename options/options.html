<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TypeTab Settings</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 32px;
      max-width: 560px;
      margin: 0 auto;
      color: #333;
      background: #fafafa;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .setting-group {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .setting-group h2 {
      font-size: 16px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .setting-row + .setting-row {
      border-top: 1px solid #f0f0f0;
    }
    .setting-label {
      font-size: 14px;
    }
    .setting-desc {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    select {
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      background: white;
      cursor: pointer;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #ccc;
      border-radius: 12px;
      transition: 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 2px;
      bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .slider { background: #4285f4; }
    .toggle input:checked + .slider::before { transform: translateX(20px); }
    .shortcut-link {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 16px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
    }
    .shortcut-link:hover { background: #3b78e7; }
    .saved-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>TypeTab Settings</h1>
  <p class="subtitle">管理标签页搜索和重复拦截的设置</p>

  <div class="setting-group">
    <h2>重复标签页拦截</h2>
    <div class="setting-row">
      <div>
        <div class="setting-label">启用拦截</div>
        <div class="setting-desc">打开已存在的页面时进行拦截</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="interceptEnabled" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label">拦截模式</div>
        <div class="setting-desc">提示模式会询问你是否切换</div>
      </div>
      <select id="interceptMode">
        <option value="prompt">提示</option>
        <option value="silent">静默切换</option>
      </select>
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label">匹配规则</div>
        <div class="setting-desc">判断两个标签页是否重复的规则</div>
      </div>
      <select id="matchRule">
        <option value="exact_url">URL 精确匹配</option>
        <option value="domain">域名匹配</option>
      </select>
    </div>
  </div>

  <div class="setting-group">
    <h2>快捷键</h2>
    <div class="setting-row">
      <div>
        <div class="setting-label">搜索快捷键</div>
        <div class="setting-desc">在 Chrome 快捷键设置中修改</div>
      </div>
    </div>
    <button class="shortcut-link" id="shortcut-btn">修改快捷键</button>
  </div>

  <div class="saved-toast" id="toast">设置已保存</div>

  <script src="options.js"></script>
</body>
</html>
