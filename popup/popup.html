<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 200px;
      max-height: 500px;
      background: #1e1e2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }
    .search-box {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid #2e2e3e;
      gap: 8px;
    }
    .search-icon { color: #888; flex-shrink: 0; }
    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-size: 15px;
      caret-color: #4285f4;
    }
    .search-box input::placeholder { color: #666; }
    .results {
      max-height: 440px;
      overflow-y: auto;
      padding: 4px 0;
    }
    .results::-webkit-scrollbar { width: 5px; }
    .results::-webkit-scrollbar-track { background: transparent; }
    .results::-webkit-scrollbar-thumb { background: #3e3e4e; border-radius: 3px; }
    .result-item {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      cursor: pointer;
      gap: 8px;
    }
    .result-item:hover, .result-item.selected { background: #2e2e3e; }
    .favicon {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .favicon-fallback {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      background: #3e3e4e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #888;
      flex-shrink: 0;
    }
    .info { flex: 1; overflow: hidden; }
    .title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .url {
      color: #666;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .no-results {
      padding: 20px 14px;
      text-align: center;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="search-box">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input type="text" id="search-input" placeholder="搜索已打开的标签页..." autocomplete="off" />
  </div>
  <div class="results" id="results"></div>
  <script src="popup.js"></script>
</body>
</html>
