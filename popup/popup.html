<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      max-height: 520px;
      background: #1e1e2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ===== Tab Bar ===== */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid #2e2e3e;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 10px 0;
      font-size: 13px;
      color: #888;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color: #ccc; }
    .tab-btn.active { color: #4285f4; border-bottom-color: #4285f4; }
    .tab-btn svg { flex-shrink: 0; }

    /* ===== Tab Content ===== */
    .tab-content {
      display: none;
      flex-direction: column;
      min-height: 200px;
      max-height: 478px;
      overflow: hidden;
    }
    .tab-content.active { display: flex; }

    /* ===== Search Tab ===== */
    .search-box {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid #2e2e3e;
      gap: 8px;
      flex-shrink: 0;
    }
    .search-icon { color: #888; flex-shrink: 0; }
    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-size: 15px;
      caret-color: #4285f4;
    }
    .search-box input::placeholder { color: #666; }
    .results {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .results::-webkit-scrollbar { width: 5px; }
    .results::-webkit-scrollbar-track { background: transparent; }
    .results::-webkit-scrollbar-thumb { background: #3e3e4e; border-radius: 3px; }
    .result-item {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      cursor: pointer;
      gap: 8px;
    }
    .result-item:hover, .result-item.selected { background: #2e2e3e; }
    .favicon {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      flex-shrink: 0;
      object-fit: contain;
    }
    .favicon-fallback {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      background: #3e3e4e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #888;
      flex-shrink: 0;
    }
    .info { flex: 1; overflow: hidden; }
    .title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .url {
      color: #666;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .no-results {
      padding: 20px 14px;
      text-align: center;
      color: #666;
      font-size: 13px;
    }

    /* ===== Settings Tab ===== */
    .settings-content {
      padding: 0 16px 16px;
      overflow-y: auto;
      flex: 1;
    }
    .section-title {
      font-size: 11px;
      color: #888;
      letter-spacing: 0.5px;
      margin: 14px 0 8px;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }
    .setting-row + .setting-row { border-top: 1px solid #2e2e3e; }
    .setting-label { font-size: 13px; }
    .setting-desc { font-size: 11px; color: #666; margin-top: 2px; }
    /* Toggle */
    .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #3e3e4e; border-radius: 11px; transition: 0.2s;
    }
    .toggle .slider::before {
      content: ''; position: absolute;
      width: 18px; height: 18px; left: 2px; bottom: 2px;
      background: white; border-radius: 50%; transition: 0.2s;
    }
    .toggle input:checked + .slider { background: #4285f4; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }
    /* Select */
    select {
      padding: 5px 8px;
      border: 1px solid #3e3e4e;
      border-radius: 4px;
      font-size: 12px;
      background: #2e2e3e;
      color: #e0e0e0;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: #4285f4; }
    /* Button */
    .shortcut-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .shortcut-btn:hover { background: #3b78e7; }
    /* Toast */
    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #4285f4;
      color: white;
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      搜索
    </button>
    <button class="tab-btn" data-tab="settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      设置
    </button>
  </div>

  <!-- Search Tab -->
  <div class="tab-content active" id="tab-search">
    <div class="search-box">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" placeholder="搜索已打开的标签页..." autocomplete="off" />
    </div>
    <div class="results" id="results"></div>
  </div>

  <!-- Settings Tab -->
  <div class="tab-content" id="tab-settings">
    <div class="settings-content">
      <div class="section-title">重复标签页拦截</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">启用拦截</div>
          <div class="setting-desc">打开已存在的页面时进行拦截</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="interceptEnabled" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">拦截模式</div>
          <div class="setting-desc">提示模式会询问你是否切换</div>
        </div>
        <select id="interceptMode">
          <option value="prompt">提示</option>
          <option value="silent">静默切换</option>
        </select>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">匹配规则</div>
          <div class="setting-desc">判断两个标签页是否重复的规则</div>
        </div>
        <select id="matchRule">
          <option value="exact_url">URL 精确匹配</option>
          <option value="domain">域名匹配</option>
        </select>
      </div>
      <div class="section-title">快捷键</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">搜索快捷键</div>
          <div class="setting-desc">Ctrl+Shift+K (Mac: Cmd+Shift+K)</div>
        </div>
      </div>
      <button class="shortcut-btn" id="shortcut-btn">修改快捷键</button>
    </div>
  </div>

  <div class="toast" id="toast">已保存</div>
  <script src="popup.js"></script>
</body>
</html>
