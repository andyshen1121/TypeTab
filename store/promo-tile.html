<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 440px;
    height: 280px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }
  .icon {
    width: 64px;
    height: 64px;
    margin-bottom: 16px;
    border-radius: 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  h1 {
    color: white;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  p {
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    text-align: center;
    line-height: 1.4;
  }
  .features {
    margin-top: 16px;
    display: flex;
    gap: 16px;
  }
  .feat {
    display: flex;
    align-items: center;
    gap: 5px;
    color: rgba(255,255,255,0.8);
    font-size: 12px;
  }
  .feat svg { flex-shrink: 0; }
</style>
</head>
<body>
  <img class="icon" src="../icons/icon-128.png" alt="TypeTab" />
  <h1>TypeTab</h1>
  <p>Quick tab search & duplicate detection</p>
  <div class="features">
    <div class="feat">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      Spotlight Search
    </div>
    <div class="feat">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Duplicate Detection
    </div>
  </div>
</body>
</html>
